<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#302b63"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- gauge track -->
  <path d="M 7 19 A 9 9 0 0 1 25 19" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- active arc -->
  <path d="M 7 19 A 9 9 0 0 1 20.5 11.2" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- needle -->
  <line x1="16" y1="19" x2="20.5" y2="11.2" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- pivot -->
  <circle cx="16" cy="19" r="2.2" fill="white"/>
  <!-- tick marks -->
  <line x1="7" y1="19" x2="8.8" y2="19" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="19" x2="23.2" y2="19" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="10" x2="16" y2="11.8" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
