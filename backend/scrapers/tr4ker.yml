id: tr4ker
name: TR4KER
description: >-
  TR4KER private tracker definition migrated from tracker-dashboard JSON.
language: fr-FR
type: private
encoding: UTF-8
links:
  - https://tr4ker.net/

settings:
  - name: username
    type: text
    label: Username
    required: true
  - name: password
    type: password
    label: Password
    required: true

login:
  method: post
  path: /login
  inputs:
    username: "{{ .Config.username }}"
    email: "{{ .Config.username }}"
    password: "{{ .Config.password }}"

stats:
  path: /
  response:
    type: html
  fields:
    uploaded:
      selector: body
      filters:
        - name: regexp
          args: 'UPLOAD\s*([0-9][0-9\s.,]*\s*(?:[KMGTPE](?:i?B|io|o)|B|o))'
        - name: parsebytes
    downloaded:
      selector: body
      filters:
        - name: regexp
          args: 'DOWNLOAD\s*([0-9][0-9\s.,]*\s*(?:[KMGTPE](?:i?B|io|o)|B|o))'
        - name: parsebytes
    ratio:
      selector: body
      optional: true
      filters:
        - name: regexp
          args: 'RATIO\s*:?\s*([0-9\s.,]+)'
        - name: parsefloat