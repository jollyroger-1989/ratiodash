id: tr4ker
name: TR4KER
description: >-
  TR4KER private tracker definition.
language: fr-FR
type: private
encoding: UTF-8
links:
  - https://tr4ker.net/

settings:
  - name: token
    type: password
    label: API Key
    required: true

stats:
  path: /api/me
  headers:
    X-API-Key: "{{ .Config.token }}"
  response:
    type: json
  fields:
    _uploaded:
      selector: uploaded
    _bonus_uploaded:
      selector: bonus_upload
      optional: true
      default: "0"
    uploaded:
      text: "{{ isum .Result._uploaded .Result._bonus_uploaded }}"
    _downloaded:
      selector: downloaded
    _bonus_downloaded:
      selector: bonus_download
      optional: true
      default: "0"
    downloaded:
      text: "{{ isum .Result._downloaded .Result._bonus_downloaded }}"
    ratio:
      text: "{{ fratio .Result.uploaded .Result.downloaded }}"